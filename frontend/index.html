<!-- web/index.html -->
<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FAQ Bot — Demo UI</title>
  <link rel="stylesheet" href="./styles.css" />
  <script defer src="./config.js"></script>
  <script defer src="./app.js"></script>
</head>
<body>
  <header class="header">
    <h1>FAQ Bot</h1>
    <button id="btnHealth" class="ghost">檢查健康</button>
  </header>

  <main class="container">
    <section class="input-card card">
      <label for="query">你的問題</label>
      <textarea id="query" rows="3" placeholder="例：系統要如何監控 FAQ Bot 的效能？"></textarea>
      <div class="row">
        <button id="btnAsk">送出</button>
        <label class="inline">
          <input id="chkKeep" type="checkbox" checked />
          保留上一題
        </label>
      </div>
      <p id="hint" class="hint"></p>
    </section>

    <section id="result" class="result card hidden">
      <div class="result-head">
        <h2>回答</h2>
        <div class="badges">
          <span id="badgeCached" class="badge hidden">Cache</span>
          <span id="badge429" class="badge warn hidden">429 等待中… <span id="retryCountdown"></span>s</span>
        </div>
      </div>
      <div id="answer" class="answer"></div>

      <details class="meta">
        <summary>來源與統計</summary>
        <div class="grid">
          <div>
            <h4>來源</h4>
            <ul id="sources"></ul>
          </div>
          <div>
            <h4>統計</h4>
            <ul id="stats"></ul>
          </div>
        </div>
      </details>
    </section>
  </main>

  <footer class="footer">
    <small>本頁為教學示範。後端：FastAPI / 前端：Vanilla JS</small>
  </footer>
</body>
</html>
