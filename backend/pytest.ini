[pytest]
testpaths = app/tests
pythonpath = .
filterwarnings =
    ignore::DeprecationWarning
addopts = -m "not e2e and not perf"
# 先跳過 e2e，避免平常開發測試時會打真的 OpenAI API
markers =
    # e2e: 真的打 OpenAI API 的測試（費用⚠️）
    e2e: marks tests as end-to-end (real OpenAI calls, run with '-m e2e')
    # perf: 本地 mock 的壓測
    perf: performance tests with mocked dependencies

