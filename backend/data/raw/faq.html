<html>
  <head><title>FAQ Bot 常見問題</title></head>
  <body>
    <h1>常見問題集</h1>
    <p><b>Q1:</b> 這個系統能回答什麼？</p>
    <p><b>A1:</b> 系統可以回答與公司內部知識庫相關的問題，例如系統架構、部署方式、操作手冊。</p>

    <p><b>Q2:</b> 資料來源是什麼？</p>
    <p><b>A2:</b> 所有答案都基於公司內部文件，例如 PDF 手冊、Word 檔案、HTML 文件。</p>

    <p><b>Q3:</b> 模型會記錄我的提問嗎？</p>
    <p><b>A3:</b> 不會，系統只會暫存快取 300 秒，並不會長期保存提問。</p>

    <p><b>Q4:</b> 支援多語言嗎？</p>
    <p><b>A4:</b> 是的，FAQ Bot 能同時處理中文與英文問題。</p>

    <p><b>Q5:</b> 如何監控成本？</p>
    <p><b>A5:</b> 系統會在 /metrics 提供 token 與成本指標，可用 Prometheus + Grafana 建立儀表板。</p>
  </body>
</html>
