name: Manual Tests (unit/e2e/perf/eval)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch or tag to test"
        required: true
        default: "main"
      test_type:
        description: "Choose which tests to run"
        required: true
        type: choice
        options:
          - unit # = not e2e and not perf and not eval
          - e2e # = e2e
          - perf # = perf
          - eval # = eval
        default: unit
      python_version:
        description: "Python version"
        required: true
        default: "3.11"
      project_dir:
        description: "Project directory"
        required: true
        default: "backend"
      extra_pytest_args:
        description: "Extra pytest args (optional)"
        required: false
        default: "-vv"
      install_cmd:
        description: "Install command (auto | your custom pip/poetry/uv command)"
        required: true
        default: "auto"

concurrency:
  group: tests-${{ github.event.inputs.branch }}-${{ github.event.inputs.test_type }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    # 為了避免動態運算子造成 YAML 語法誤判，這裡直接設長一點
    timeout-minutes: 90

    permissions:
      contents: read

    env:
      PYTHONUNBUFFERED: "1"
      TOKENIZERS_PARALLELISM: "false"
      TORCH_NUM_THREADS: "1"
      PYTEST_ADDOPTS: "-ra --tb=short"
      AWS_DEFAULT_REGION: "us-east-1"
      APP_ENV: "test"

    steps:
      - name: Checkout ${{ github.event.inputs.branch }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0

      - name: Set up Python ${{ github.event.inputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ github.event.inputs.python_version }}
          cache: pip
          cache-dependency-path: |
            ${{ github.event.inputs.project_dir }}/**/requirements*.txt
            ${{ github.event.inputs.project_dir }}/pyproject.toml
            ${{ github.event.inputs.project_dir }}/**/*.lock

      - name: Upgrade pip tooling
        run: python -m pip install -U pip wheel setuptools

      - name: Install dependencies
        working-directory: ${{ github.event.inputs.project_dir }}
        shell: bash
        run: |
          set -e
          if [[ "${{ github.event.inputs.install_cmd }}" != "auto" ]]; then
            echo "Running custom install: ${{ github.event.inputs.install_cmd }}"
            eval "${{ github.event.inputs.install_cmd }}"
          else
            if [[ -f requirements.txt ]]; then pip install -r requirements.txt; fi
            if [[ -f requirements-dev.txt ]]; then pip install -r requirements-dev.txt; fi
            if [[ -f pyproject.toml ]]; then pip install -e .; fi
          fi
          # 確保 pytest 存在（避免 here-doc，單行最穩）
          python - <<'PY'
          import importlib, sys, subprocess
          try:
              importlib.import_module("pytest")
          except ModuleNotFoundError:
              subprocess.check_call([sys.executable, "-m", "pip", "install", "pytest"])
          PY

      - name: Select markers by test type
        shell: bash
        run: |
          case "${{ github.event.inputs.test_type }}" in
            unit) MARKERS='not e2e and not perf and not eval' ;;
            e2e)  MARKERS='e2e' ;;
            perf) MARKERS='perf' ;;
            eval) MARKERS='eval' ;;
            *)    echo "Unknown test_type"; exit 1 ;;
          esac
          echo "MARKERS=$MARKERS" >> "$GITHUB_ENV"
          echo "Selected markers: $MARKERS"

      - name: Add verbose flags for eval
        if: ${{ github.event.inputs.test_type == 'eval' }}
        run: |
          echo 'PYTEST_EVAL_FLAGS=-vv -s --capture=tee-sys' >> $GITHUB_ENV

      - name: Run pytest
        working-directory: ${{ github.event.inputs.project_dir }}
        run: |
          mkdir -p test-reports
          ARGS="${PYTEST_EVAL_FLAGS} ${{ github.event.inputs.extra_pytest_args }}"
          echo "pytest -m \"${MARKERS}\" ${ARGS}"
          pytest -m "${MARKERS}" ${ARGS} --junitxml=test-reports/junit.xml

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ github.event.inputs.test_type }}-py${{ github.event.inputs.python_version }}
          path: ${{ github.event.inputs.project_dir }}/test-reports/junit.xml
          if-no-files-found: warn
