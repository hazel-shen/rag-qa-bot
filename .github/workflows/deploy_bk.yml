name: Build & Push to GHCR (backend only)

on:
  push:
    branches: ["test"]
    paths:
      - "backend/app/**"
      - ".github/workflows/deploy.yml"
      - "backend/Dockerfile"
      - "backend/requirements.txt"

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    outputs:
      image: ${{ steps.vars.outputs.IMAGE }}
      tag_latest: ${{ steps.vars.outputs.TAG_LATEST }}
      tag_sha: ${{ steps.vars.outputs.TAG_SHA }}
      repo_lc: ${{ steps.vars.outputs.REPO_LC }}

    steps:
      - uses: actions/checkout@v4

      # 取得「小寫」的 owner / repo 與 tags
      - name: Compute image refs (lowercase)
        id: vars
        shell: bash
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_LC=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=${GITHUB_SHA::7}
          echo "IMAGE=ghcr.io/${OWNER_LC}/${REPO_LC}" >> $GITHUB_OUTPUT
          echo "TAG_LATEST=ghcr.io/${OWNER_LC}/${REPO_LC}:latest" >> $GITHUB_OUTPUT
          echo "TAG_SHA=ghcr.io/${OWNER_LC}/${REPO_LC}:git-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "REPO_LC=${REPO_LC}" >> $GITHUB_OUTPUT   # 輸出 repo 名小寫

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push (arm64) with cache
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/arm64/v8
          push: true
          tags: |
            ${{ steps.vars.outputs.TAG_LATEST }}
            ${{ steps.vars.outputs.TAG_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ap-northeast-1

      - name: Deploy via SSM
        uses: aws-actions/amazon-ssm-send-command@v1
        with:
          document-name: "AWS-RunShellScript"
          instance-ids: ${{ secrets.EC2_INSTANCE_ID }}
          comment: "Deploy ${{ needs.build-push.outputs.tag_latest }}"
          command: |
            set -euo pipefail
            IMAGE="${{ needs.build-push.outputs.tag_latest }}"
            CONTAINER_NAME="${{ needs.build-push.outputs.repo_lc }}"
            SECRET_ARN="${{ secrets.GHCR_SECRET_ARN }}"
            GHCR_USER="${{ secrets.GHCR_USERNAME }}"

            GHCR_PAT=$(aws secretsmanager get-secret-value --secret-id "$SECRET_ARN" --query 'SecretString' --output text)
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            docker pull "$IMAGE"
            docker rm -f "$CONTAINER_NAME" || true
            docker run -d --name "$CONTAINER_NAME" --restart always -p 8080:80 "$IMAGE"

            if ! curl -sf "http://127.0.0.1:8080/health" >/dev/null; then
              echo "❌ Health check failed, dumping logs..."
              docker logs "$CONTAINER_NAME" || true
              exit 1
            fi
            echo "✅ Deploy success"
