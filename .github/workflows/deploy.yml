name: Build & Deploy Backend

on:
  workflow_dispatch: # 👉 手動觸發，允許指定要 build 的 branch 與是否只部署
    inputs:
      branch:
        description: "Branch to build"
        required: true
        default: "main"
      deploy_only:
        description: "Skip build and only deploy existing image (true/false)"
        required: true
        default: "false"
      app_env:
        description: "APP_ENV for deployment (prod/staging/dev)"
        required: true
        default: "prod"

jobs:
  build-push:
    # 👉 如果 deploy_only = true，就不跑 build，直接進 deploy
    if: ${{ github.event.inputs.deploy_only != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 推送 GHCR 需要
      id-token: write # 用 OIDC 連 AWS 時需要

    outputs:
      tag_latest: ${{ steps.vars.outputs.TAG_LATEST }}
      repo_lc: ${{ steps.vars.outputs.REPO_LC }}

    steps:
      # 檢出指定 branch 的程式碼
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 計算 GHCR image 路徑（全小寫）
      - name: Compute image refs (lowercase)
        id: vars
        shell: bash
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          # 以 github.repository 可靠取得 <owner>/<repo>，再切出 repo 名
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          REPO_LC=$(echo "${REPO_NAME}" | tr '[:upper:]' '[:lower:]')
          echo "TAG_LATEST=ghcr.io/${OWNER_LC}/${REPO_LC}:latest" >> $GITHUB_OUTPUT
          echo "REPO_LC=${REPO_LC}" >> $GITHUB_OUTPUT

      # 登入 GHCR，用 GitHub Token（自動有權限推送到當前 repo 的 GHCR）
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 啟用 buildx（多平台支援）
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # 建置 Docker image 並推送到 GHCR
      - name: Build & Push (arm64) with cache
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/arm64/v8 # 因為 EC2 是 ARM 架構
          push: true
          tags: |
            ${{ steps.vars.outputs.TAG_LATEST }}
          cache-from: type=gha # 使用 GitHub Actions cache 加速 build
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-push]
    # 👉 總是跑 deploy，條件是：deploy_only=true 或 build 成功
    if: ${{ always() && (github.event.inputs.deploy_only == 'true' || needs.build-push.result == 'success') }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write # 用 OIDC 連 AWS
      contents: read

    steps:
      # 檢出 repo，主要是要讀 ops/deploy_container.sh
      - uses: actions/checkout@v4

      # 設定 AWS credentials（OIDC AssumeRole）
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 計算 container name & image
      - name: Compute container info
        id: decide
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_LC=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "container_name=${REPO_LC}" >> $GITHUB_OUTPUT
          echo "image=ghcr.io/${OWNER_LC}/${REPO_LC}:latest" >> $GITHUB_OUTPUT

      # 把 repo 中的部署腳本轉成 base64，送到 EC2 再解碼執行
      - name: Send SSM deploy command (repo script via base64)
        id: send
        env:
          IMAGE: ${{ steps.decide.outputs.image }}
          CONTAINER_NAME: ${{ steps.decide.outputs.container_name }}
          GHCR_SECRET_ARN: ${{ secrets.GHCR_SECRET_ARN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          APP_ENV: ${{ github.event.inputs.app_env }}
          AWS_SECRETS_ID: ${{ secrets.AWS_SECRETS_ID }}
        run: |
          # base64 編碼腳本內容，避免多層引號問題
          B64=$(base64 -w0 ops/deploy_container.sh)

          # 發送 SSM 指令：EC2 解碼腳本並執行
          RESP=$(aws ssm send-command \
            --targets "Key=instanceIds,Values=${EC2_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy $IMAGE" \
            --parameters "commands=[
              \"set -euo pipefail\",
              \"echo '${B64}' | base64 -d > /tmp/deploy.sh\",
              \"chmod +x /tmp/deploy.sh\",
              \"bash /tmp/deploy.sh '${IMAGE}' '${CONTAINER_NAME}' '${GHCR_SECRET_ARN}' '${GHCR_USERNAME}' '${APP_ENV}' '${AWS_SECRETS_ID}'\"
            ]" \
          )
          # 抓取 CommandId 以便後續查詢
          CMD_ID=$(echo "$RESP" | jq -r '.Command.CommandId')
          echo "command_id=$CMD_ID" >> $GITHUB_OUTPUT

      - name: Wait and show SSM output
        env:
          CMD_ID: ${{ steps.send.outputs.command_id }}
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
        run: |
          echo "⏳ Waiting for SSM command $CMD_ID to finish ..."
          for i in {1..12}; do  # 120*5s = 1 分鐘
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            echo "Status: $STATUS ($i/120)"
            case "$STATUS" in
              Success|Failed|Cancelled|TimedOut) break ;;
              *) sleep 5 ;;
            esac
          done

          echo "----- STDOUT -----"
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --plugin-name "aws:runShellScript" \
            --query 'StandardOutputContent' \
            --output text || true

          echo "----- STDERR -----"
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --plugin-name "aws:runShellScript" \
            --query 'StandardErrorContent' \
            --output text || true

          [[ "$STATUS" == "Success" ]] || { echo "❌ Deployment status: $STATUS"; exit 1; }
