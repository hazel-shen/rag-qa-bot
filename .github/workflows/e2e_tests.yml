name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch or tag to test"
        required: true
        default: "main"
      python_version:
        description: "Python version"
        required: true
        default: "3.11"
      project_dir:
        description: "Project directory"
        required: true
        default: "backend"
      extra_pytest_args:
        description: "Extra pytest args (optional)"
        required: false
        default: ""

concurrency:
  group: e2e-tests-${{ github.event.inputs.branch }}
  cancel-in-progress: false

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: read

    # 非敏感、穩定的設定直接放這裡（不用再到設定頁面調整）
    env:
      PYTHONUNBUFFERED: "1"
      TOKENIZERS_PARALLELISM: "false"
      TORCH_NUM_THREADS: "1"
      PYTEST_ADDOPTS: "-ra --tb=short"

      # 應用最小必需
      INDEX_PATH: data/docs/index.faiss
      DOCSTORE_PATH: data/docs/docstore.jsonl
      EMBED_MODEL: text-embedding-3-small # 查詢端 & 建索引一致
      CACHE_BACKEND: memory # 避免 CI 需要 Redis

    steps:
      - name: Checkout ${{ github.event.inputs.branch }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0
          lfs: true # raw 放 LFS 的話一定要開

      - name: Set up Python ${{ github.event.inputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ github.event.inputs.python_version }}

      # 套件安裝：與 Unit Tests 完全一致
      - name: Install uv
        run: pip install uv

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        working-directory: ${{ github.event.inputs.project_dir }}
        run: |
          if [[ -f requirements.txt ]]; then uv pip install -r requirements.txt --system; fi
          if [[ -f requirements-dev.txt ]]; then uv pip install -r requirements-dev.txt --system; fi
          if [[ -f pyproject.toml ]]; then uv pip install -e . --system; fi

      # 提早驗證：沒有 OPENAI_API_KEY 就直接 fail
      - name: Validate OPENAI_API_KEY
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [[ -z "${OPENAI_API_KEY:-}" ]]; then
            echo "::error::Missing OPENAI_API_KEY (set it in Repository secrets)"
            exit 1
          fi
          echo "OPENAI_API_KEY is set (masked)."

      # 構建語料 & 索引：先還原快取，沒命中才重建
      - name: Restore FAISS index cache
        id: faiss-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ github.event.inputs.project_dir }}/data/clean/chunks.jsonl
            ${{ github.event.inputs.project_dir }}/data/docs/index.faiss
            ${{ github.event.inputs.project_dir }}/data/docs/docstore.jsonl
          key: faiss-${{ runner.os }}-${{ env.EMBED_MODEL }}-${{ env.INDEX_VERSION }}-${{ hashFiles(format('{0}/data/raw/**', github.event.inputs.project_dir)) }}-${{ hashFiles(format('{0}/app/ingest/**', github.event.inputs.project_dir), format('{0}/app/build_index*', github.event.inputs.project_dir)) }}

      - name: Verify raw docs exist
        if: steps.faiss-cache-restore.outputs.cache-hit != 'true'
        working-directory: ${{ github.event.inputs.project_dir }}
        run: |
          shopt -s nullglob
          files=(data/raw/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "❌ backend/data/raw/ 沒有任何原始文件，無法建立索引"
            exit 1
          fi

      - name: Build corpus (clean & slice)
        if: steps.faiss-cache-restore.outputs.cache-hit != 'true'
        working-directory: ${{ github.event.inputs.project_dir }}
        run: |
          set -euxo pipefail
          mkdir -p data/clean data/docs
          python -m app.ingest.cli_ingest \
            --input ./data/raw \
            --out ./data/clean/chunks.jsonl
          test -s data/clean/chunks.jsonl

      - name: Build FAISS index
        if: steps.faiss-cache-restore.outputs.cache-hit != 'true'
        working-directory: ${{ github.event.inputs.project_dir }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euxo pipefail
          python -m app.build_index \
            --chunks ./data/clean/chunks.jsonl \
            --docstore ./data/docs/docstore.jsonl \
            --index ./data/docs/index.faiss
          test -s data/docs/index.faiss
          test -s data/docs/docstore.jsonl

      - name: Save FAISS index cache
        if: steps.faiss-cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ github.event.inputs.project_dir }}/data/clean/chunks.jsonl
            ${{ github.event.inputs.project_dir }}/data/docs/index.faiss
            ${{ github.event.inputs.project_dir }}/data/docs/docstore.jsonl
          key: faiss-${{ runner.os }}-${{ env.EMBED_MODEL }}-${{ env.INDEX_VERSION }}-${{ hashFiles(format('{0}/data/raw/**', github.event.inputs.project_dir)) }}-${{ hashFiles(format('{0}/app/ingest/**', github.event.inputs.project_dir), format('{0}/app/build_index*', github.event.inputs.project_dir)) }}

      - name: Upload index artifacts (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: faiss-index-and-chunks
          path: |
            ${{ github.event.inputs.project_dir }}/data/clean/chunks.jsonl
            ${{ github.event.inputs.project_dir }}/data/docs/index.faiss
            ${{ github.event.inputs.project_dir }}/data/docs/docstore.jsonl
          if-no-files-found: warn

      #  執行 E2E
      - name: Run E2E tests (OpenAI)
        working-directory: ${{ github.event.inputs.project_dir }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }} # e2e 測試一定要有
        run: |
          mkdir -p test-reports
          pytest -vv -m "e2e" \
            ${{ github.event.inputs.extra_pytest_args }} \
            --junitxml=test-reports/junit.xml

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-e2e-py${{ github.event.inputs.python_version }}
          path: ${{ github.event.inputs.project_dir }}/test-reports/junit.xml
          if-no-files-found: warn
