<svg width="100%" viewBox="0 0 680 868" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif">
<title>Agent Governance 架構圖（對齊 MCP Host/Client/Server 三層）</title>
<desc>兩個 MCP host/client 並列：自製輕量 agent 與 Hermes 這類完整 agent，各自單跳呼叫同一個 MCP server。MCP server 是獨立 process、所有受治理 tool action 的唯一執行端點（能繞過 tool 介面直接產生副作用的動作是另一個邊界）；Policy Gate 在 server 端、底層 tool 執行前逐次 enforce，依驗證後的 caller 身份回 allow 或 deny。下方是 policy 更新路徑：Agent 提議、GitHub CI 測試紅燈修正後綠燈合併，由 homelab 內的 self-hosted runner 主動向外領工作、在本機讓 local OPA 載入新 policy。</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<marker id="arrow-signal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="0" y="0" width="680" height="868" fill="#ffffff"/>
<text x="340" y="30" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">兩種 agent 各自單跳呼叫同一個 MCP server，gate 在 server 端逐次 enforce</text>

<!-- ===== 上方：兩個 MCP host/client 並列 ===== -->
<text x="180" y="58" text-anchor="middle" font-size="13" font-weight="500" fill="#185FA5">MCP host / client A</text>
<text x="500" y="58" text-anchor="middle" font-size="13" font-weight="500" fill="#534AB7">MCP host / client B</text>

<rect x="60" y="72" width="240" height="58" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="180" y="94" text-anchor="middle" font-size="13" font-weight="500" fill="#0C447C">自製輕量 agent</text>
<text x="180" y="112" text-anchor="middle" font-size="12" fill="#185FA5">封閉三 tool，刻意極簡顯機制</text>

<rect x="380" y="72" width="240" height="58" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="500" y="94" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Hermes 這類完整 agent</text>
<text x="500" y="112" text-anchor="middle" font-size="12" fill="#534AB7">能管主機，功能完整</text>

<text x="180" y="152" text-anchor="middle" font-size="12" fill="#5F5E5A">tools/call（單跳）</text>
<line x1="180" y1="130" x2="180" y2="186" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="500" y="152" text-anchor="middle" font-size="12" fill="#5F5E5A">tools/call（單跳）</text>
<line x1="500" y1="130" x2="500" y2="186" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="340" y="170" text-anchor="middle" font-size="12" fill="#5F5E5A">各帶已驗證身份（OAuth 2.1 / mTLS）</text>

<!-- ===== 中央：MCP server（唯一執行端點）===== -->
<rect x="40" y="186" width="600" height="286" rx="14" fill="none" stroke="#0F6E56" stroke-width="0.5" stroke-dasharray="6 4"/>
<text x="64" y="208" font-size="13" font-weight="500" fill="#0F6E56">MCP server（獨立 process，所有受治理 tool action 的唯一執行端點）</text>

<rect x="180" y="222" width="320" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="242" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">驗證 caller 身份 + 暴露 high-level tool</text>
<text x="340" y="260" text-anchor="middle" font-size="12" fill="#0F6E56">逐次呼叫重新評估「這次代表誰」</text>

<line x1="340" y1="272" x2="340" y2="300" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="340" y="290" text-anchor="middle" font-size="12" font-weight="500" fill="#854F0B">★ 攔截點：底層 tool 執行前，per call ★</text>

<rect x="190" y="300" width="300" height="74" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="340" y="322" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">Policy Gate（OPA :8181）</text>
<text x="340" y="342" text-anchor="middle" font-size="12" fill="#854F0B">input = { subject, tool, args, ... }</text>
<text x="340" y="360" text-anchor="middle" font-size="12" fill="#854F0B">綁定 caller 身份，非快取的授權狀態</text>

<text x="250" y="396" text-anchor="middle" font-size="12" fill="#0F6E56">allow</text>
<line x1="290" y1="374" x2="250" y2="410" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="430" y="396" text-anchor="middle" font-size="12" fill="#A32D2D">deny</text>
<line x1="390" y1="374" x2="430" y2="410" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="120" y="410" width="180" height="34" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="210" y="431" text-anchor="middle" font-size="12" fill="#085041">底層 tool → 執行</text>
<rect x="380" y="410" width="180" height="34" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text x="470" y="431" text-anchor="middle" font-size="12" fill="#791F1F">send_email → 擋下</text>

<text x="340" y="462" text-anchor="middle" font-size="12" fill="#085041">凡走 tool 介面的動作，後端只接受來自 server 的操作 — 繞不過 gate</text>

<!-- ===== 新增：deny 累積異常訊號 → 觸發更新提議（客觀計數觸發，非偵測意圖）===== -->
<path d="M470 444 C470 484 474 498 420 504 C290 522 188 512 140 552"
      fill="none" stroke="#D6336C" stroke-width="2" stroke-linecap="round"
      marker-end="url(#arrow-signal)"/>
<text x="498" y="492" font-size="12" font-weight="500" fill="#C2255C">累積異常訊號過多，</text>
<text x="498" y="508" font-size="12" font-weight="500" fill="#C2255C">觸發更新提議</text>

<!-- policy 灌入箭頭：本機 git pull（runner）直接灌回 Policy Gate（右側上行） -->
<text x="600" y="330" text-anchor="middle" font-size="12" fill="#185FA5">載入 policy</text>
<path d="M620 578 L656 578 L656 337 L492 337"
      fill="none" stroke="#185FA5" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow)"/>

<!-- ===== 下方：policy 更新路徑 ===== -->
<rect x="40" y="520" width="600" height="156" rx="12" fill="none" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="6 4"/>
<text x="64" y="542" font-size="13" font-weight="500" fill="#185FA5">policy 更新路徑：Agent 提議 → CI 裁決 → runner 灌回（control plane）</text>

<rect x="60" y="556" width="160" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="140" y="574" text-anchor="middle" font-size="12" font-weight="500" fill="#3C3489">Agent 提議第二版</text>
<text x="140" y="591" text-anchor="middle" font-size="12" fill="#534AB7">只有提議權</text>

<line x1="220" y1="578" x2="252" y2="578" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="254" y="556" width="172" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="340" y="574" text-anchor="middle" font-size="12" font-weight="500" fill="#633806">GitHub CI：opa test</text>
<text x="340" y="591" text-anchor="middle" font-size="12" fill="#854F0B">紅燈→修正→綠燈 + PR review</text>

<line x1="426" y1="578" x2="458" y2="578" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="460" y="556" width="160" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="540" y="574" text-anchor="middle" font-size="12" font-weight="500" fill="#085041">self-hosted runner</text>
<text x="540" y="591" text-anchor="middle" font-size="12" fill="#0F6E56">本機 git pull</text>

<text x="330" y="636" text-anchor="middle" font-size="12" fill="#185FA5">→ local OPA 載入新 policy（重啟 / --watch；生產用 bundle 輪詢）</text>

<text x="64" y="660" font-size="12" fill="#444441">• runner 主動向外掛長連線等 GitHub 推回 — 不需對外域名、不開 inbound port</text>

<!-- ===== 底部：對齊 spec 的生產註記 ===== -->
<rect x="40" y="696" width="600" height="156" rx="12" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="64" y="720" font-size="14" font-weight="500" fill="#2C2C2A">對齊 MCP spec 的治理要點（生產做法）</text>
<text x="64" y="744" font-size="12" fill="#444441">• 授權須綁 caller 身份、逐次 enforce — 否則落入 confused deputy / caller identity confusion</text>
<text x="64" y="764" font-size="12" fill="#444441">• 禁止 token passthrough；client 帶 resource 參數，server 驗證 token 是發給自己的（RFC 8707）</text>
<text x="64" y="784" font-size="12" fill="#444441">• 身份委派給外部 OIDC（如 Keycloak）；server 只驗 token、enforce policy，不自建 IdP</text>
<text x="64" y="804" font-size="12" fill="#444441">• input 由 RBAC 擴充到 ABAC：+ caller / delegation / resource / environment</text>
<text x="64" y="824" font-size="12" fill="#444441">• 每次 decision 留 audit log：request_id / subject / caller / tool / decision / policy_version</text>
<text x="64" y="844" font-size="12" fill="#444441">• OPA / policy 載入或 CI 失敗一律 fail-closed — 不確定就 deny</text>
</svg>
